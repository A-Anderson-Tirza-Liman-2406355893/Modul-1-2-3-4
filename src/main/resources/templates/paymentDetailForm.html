<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><title>Find Payment</title></head>
<body>
<h2>Find Payment by ID</h2>
<form onsubmit="event.preventDefault(); window.location.href='/payment/detail/' + document.getElementById('paymentId').value;">
    <input type="text" id="paymentId" required placeholder="Enter Payment ID">
    <button type="submit">Search</button>
</form>
</body>
</html>
